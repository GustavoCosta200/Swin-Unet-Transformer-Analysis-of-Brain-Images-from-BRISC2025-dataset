# Configuração para o TCC 2: quatro pipelines controladas + modelo Swin-Unet oficial.
# A arquitetura é carregada a partir do repositório HuCaoFighting/Swin-Unet.

project_name: tcc2_swin_unet_brisc
seed: 42
device: cuda

paths:
  dataset_root: ../brisc2025/segmentation_task
  train_images: train/images
  train_masks: train/masks
  test_images: test/images
  test_masks: test/masks
  output_dir: ./outputs
  checkpoint_dir: ./checkpoints

experiment:
  # Pipelines disponíveis:
  # P0: baseline, redimensionamento + binarização + normalização
  # P1: P0 + filtro gaussiano + filtro de mediana
  # P2: P1 + CLAHE
  # P3: P2 + augmentation no treino
  # P4: P0 + augmentation no treino, sem filtros e sem CLAHE
  pipeline: P4
  val_size: 0.20
  max_train_samples: null
  max_test_samples: null
  num_workers: 2

  # Mantém treino/validação/teste com a mesma quantidade de imagens por classe tumoral.
  # O balanceamento é feito por subamostragem da menor classe.
  balance_classes: true
  balance_class_names: [glioma, meningioma, pituitary]

  # Ajuste estes aliases se os nomes dos arquivos do BRISC no seu ambiente usarem
  # outra abreviação para algum tumor.
  # Exemplo esperado: brisc2025_train_00015_gl_ax_t1.jpg -> glioma.
  class_aliases:
    glioma: [glioma, gl]
    meningioma: [meningioma, men, me]
    pituitary: [pituitary, pit, pi]

image:
  # A configuração oficial do Swin-Unet é baseada em 224x224.
  # A monografia define resolução fixa, sem obrigar um valor específico.
  size: 224
  in_channels: 3
  num_classes: 1

  # Como o BRISC é lido em tons de cinza, os canais são replicados para manter
  # compatibilidade com a configuração oficial e possíveis pesos pré-treinados.
  repeat_grayscale_to_rgb: true
  normalize_mean: 0.5
  normalize_std: 0.5

preprocessing:
  gaussian_kernel: 3
  gaussian_sigma: 0
  median_kernel: 3
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: 8

augmentation:
  rotate_limit: 10
  shift_limit: 0.05
  scale_limit: 0.10
  brightness_limit: 0.10
  contrast_limit: 0.10
  horizontal_flip: true
  elastic_transform: false
  

model:
  name: official_swin_unet
  official_repo_dir: ./external/Swin-Unet

  # Após clonar o repositório oficial, confirme o nome exato do YAML disponível.
  # No repositório original costuma ser usado um YAML da família swin_tiny_patch4_window7_224.
  official_config: ./external/Swin-Unet/configs/swin_tiny_patch4_window7_224_lite.yaml
  pretrained_path: null

train:
  epochs: 600
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.00001
  early_stopping_patience: 30
  loss: bce_dice
  threshold: 0.5
  save_best_by: val_dice

evaluation:
  threshold: 0.5
  metrics:
    - dice
    - iou
    - pixel_accuracy
    - precision
    - recall